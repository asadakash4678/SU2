<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#0f766e">
<title>SUMS · Surgical Unit-II Management System</title>
<style>

/* ============================================================
   SURGICAL UNIT II MANAGEMENT SYSTEM (SUMS)
   Self-contained. No external fonts, scripts, or network.
   ============================================================ */
:root{
  --ink:#0e1826; --ink-2:#324155; --ink-3:#5c6b80; --muted:#8695a8;
  --line:#e2e8f0; --line-2:#eef2f7; --bg:#f4f7fb; --panel:#ffffff;
  --primary:#0b6b6b; --primary-d:#075353; --primary-l:#e5f2f2;
  --teal:#0b8a8a;
  --red:#c02640; --red-l:#fbe9ec; --red-d:#8f1a2e;
  --amber:#c07a15; --amber-l:#fbf1de; --amber-d:#8a5709;
  --green:#1a8a4a; --green-l:#e6f4ec; --green-d:#0f6234;
  --blue:#1f5fbf; --blue-l:#e8f0fc;
  --purple:#6a3fb0; --purple-l:#efe9fa;
  --radius:10px; --radius-s:7px;
  --shadow:0 1px 2px rgba(16,30,54,.06),0 4px 14px rgba(16,30,54,.05);
  --shadow-lg:0 8px 40px rgba(16,30,54,.16);
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --mono:ui-monospace,"SF Mono","Cascadia Code","Roboto Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);
  font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink)}
a{color:var(--primary);text-decoration:none}
h1,h2,h3,h4{margin:0;font-weight:650;letter-spacing:-.01em}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
.muted{color:var(--muted)}
.hidden{display:none !important}

/* ---------- form controls ---------- */
label.fld{display:block;margin-bottom:12px}
label.fld>span{display:block;font-size:12px;font-weight:600;color:var(--ink-2);margin-bottom:5px}
label.fld>span .req{color:var(--red)}
.inp,select.inp,textarea.inp{width:100%;padding:9px 11px;border:1px solid var(--line);
  border-radius:var(--radius-s);background:#fff;transition:border-color .12s,box-shadow .12s;outline:none}
.inp:focus,select.inp:focus,textarea.inp:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-l)}
textarea.inp{resize:vertical;min-height:70px;line-height:1.5}
select.inp{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M1 1l4 4 4-4' stroke='%235c6b80' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>");
  background-repeat:no-repeat;background-position:right 11px center;padding-right:30px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 14px}
@media(max-width:640px){.grid2,.grid3{grid-template-columns:1fr}}

/* ---------- buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:var(--radius-s);
  font-weight:600;font-size:13.5px;background:#fff;border:1px solid var(--line);color:var(--ink-2);
  transition:background .12s,border-color .12s,transform .05s;white-space:nowrap}
.btn:hover{background:var(--line-2);border-color:#d3dbe6}
.btn:active{transform:translateY(1px)}
.btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
.btn.primary:hover{background:var(--primary-d);border-color:var(--primary-d)}
.btn.danger{background:var(--red);border-color:var(--red);color:#fff}
.btn.danger:hover{background:var(--red-d)}
.btn.ghost{background:transparent;border-color:transparent}
.btn.ghost:hover{background:var(--line-2)}
.btn.sm{padding:6px 11px;font-size:12.5px}
.btn.xs{padding:4px 9px;font-size:12px;border-radius:6px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn svg{width:15px;height:15px}

/* ---------- badges & chips ---------- */
.badge{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:20px;
  font-size:11.5px;font-weight:650;line-height:1.6;letter-spacing:.01em}
.badge.red{background:var(--red-l);color:var(--red-d)}
.badge.amber{background:var(--amber-l);color:var(--amber-d)}
.badge.green{background:var(--green-l);color:var(--green-d)}
.badge.blue{background:var(--blue-l);color:var(--blue)}
.badge.purple{background:var(--purple-l);color:var(--purple)}
.badge.gray{background:var(--line-2);color:var(--ink-3)}
.badge.teal{background:var(--primary-l);color:var(--primary-d)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex:none}
.dot.red{background:var(--red)} .dot.amber{background:var(--amber)}
.dot.green{background:var(--green)} .dot.blue{background:var(--blue)}
.pulse{animation:pulse 1.8s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(192,38,64,.45)}70%{box-shadow:0 0 0 6px rgba(192,38,64,0)}100%{box-shadow:0 0 0 0 rgba(192,38,64,0)}}

/* ---------- cards / panels ---------- */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.panel-h{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:14px 16px;border-bottom:1px solid var(--line-2)}
.panel-h h3{font-size:14.5px}
.panel-b{padding:16px}

/* ---------- app layout ---------- */
#app{height:100%}
.layout{display:flex;height:100%}
.sidebar{width:230px;flex:none;background:#0d2029;color:#cdd9de;display:flex;flex-direction:column;
  border-right:1px solid #12303b}
.sb-brand{padding:17px 18px 14px;border-bottom:1px solid #163943;display:flex;align-items:center;gap:10px}
.sb-logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#0b8a8a,#075353);
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;flex:none}
.sb-brand b{color:#fff;font-size:15px;display:block;letter-spacing:-.02em}
.sb-brand small{color:#7fa0ab;font-size:11px}
.sb-nav{flex:1;overflow-y:auto;padding:10px 10px 20px}
.sb-sec{font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;color:#5f8592;
  margin:14px 10px 6px;font-weight:700}
.nav-i{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:8px;
  color:#b7c8ce;font-weight:550;font-size:13.5px;margin-bottom:1px;transition:background .12s,color .12s;position:relative}
.nav-i:hover{background:#123039;color:#fff}
.nav-i.active{background:#0b8a8a;color:#fff}
.nav-i svg{width:18px;height:18px;flex:none;opacity:.92}
.nav-i .nbadge{margin-left:auto;background:#c02640;color:#fff;font-size:10.5px;font-weight:700;
  min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.sb-user{padding:11px 12px;border-top:1px solid #163943;display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:50%;background:#0b8a8a;color:#fff;display:flex;
  align-items:center;justify-content:center;font-weight:700;font-size:13px;flex:none}
.sb-user .nm{font-size:13px;color:#fff;font-weight:600;line-height:1.2}
.sb-user .rl{font-size:11px;color:#7fa0ab}

.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{height:56px;flex:none;background:#fff;border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:14px;padding:0 18px}
.topbar .menu-btn{display:none}
.ward-strip{display:flex;align-items:center;gap:16px;font-size:12.5px;color:var(--ink-2)}
.ward-strip .ws{display:flex;align-items:center;gap:6px}
.ward-strip b{color:var(--ink);font-weight:650}
.search-wrap{position:relative;margin-left:auto;width:300px;max-width:38vw}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted)}
.search-wrap input{width:100%;padding:8px 11px 8px 34px;border:1px solid var(--line);border-radius:20px;
  background:var(--bg);outline:none}
.search-wrap input:focus{border-color:var(--primary);background:#fff}
.search-res{position:absolute;top:44px;left:0;right:0;background:#fff;border:1px solid var(--line);
  border-radius:var(--radius);box-shadow:var(--shadow-lg);max-height:60vh;overflow-y:auto;z-index:60}
.search-res .sr{padding:10px 12px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;gap:10px}
.search-res .sr:hover{background:var(--line-2)}
.icon-btn{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  color:var(--ink-2);position:relative}
.icon-btn:hover{background:var(--line-2)}
.icon-btn svg{width:19px;height:19px}
.icon-btn .cnt{position:absolute;top:4px;right:4px;background:var(--red);color:#fff;font-size:9.5px;
  font-weight:700;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px}

.content{flex:1;overflow-y:auto;padding:20px 22px 60px}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.page-head h1{font-size:22px}
.page-head .sub{color:var(--muted);font-size:13px;margin-top:2px}

/* ---------- stat cards ---------- */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:18px}
.stat{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:13px 15px;
  box-shadow:var(--shadow);cursor:pointer;transition:transform .1s,box-shadow .12s;position:relative;overflow:hidden}
.stat:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.stat .lbl{font-size:12px;color:var(--ink-3);font-weight:600;display:flex;align-items:center;gap:6px}
.stat .val{font-size:27px;font-weight:750;margin-top:5px;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.stat .sub{font-size:11.5px;color:var(--muted);margin-top:2px}
.stat .ic{position:absolute;right:12px;top:13px;width:22px;height:22px;opacity:.35}
.stat.accent-red{border-left:3px solid var(--red)} .stat.accent-amber{border-left:3px solid var(--amber)}
.stat.accent-green{border-left:3px solid var(--green)} .stat.accent-teal{border-left:3px solid var(--primary)}
.stat.accent-blue{border-left:3px solid var(--blue)} .stat.accent-purple{border-left:3px solid var(--purple)}

/* ---------- dashboard grid ---------- */
.dash-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;align-items:start}
@media(max-width:960px){.dash-grid{grid-template-columns:1fr}}
.stack{display:flex;flex-direction:column;gap:16px}

/* ---------- alerts ---------- */
.alert-row{display:flex;align-items:flex-start;gap:11px;padding:11px 14px;border-bottom:1px solid var(--line-2);cursor:pointer}
.alert-row:hover{background:var(--line-2)}
.alert-row:last-child{border-bottom:none}
.alert-ic{width:30px;height:30px;border-radius:8px;flex:none;display:flex;align-items:center;justify-content:center}
.alert-ic svg{width:16px;height:16px}
.a-red{background:var(--red-l);color:var(--red-d)} .a-amber{background:var(--amber-l);color:var(--amber-d)}
.a-blue{background:var(--blue-l);color:var(--blue)}
.alert-row .txt{flex:1;min-width:0}
.alert-row .txt b{font-size:13px}
.alert-row .txt .meta{font-size:11.5px;color:var(--muted)}

/* ---------- patient cards ---------- */
.pt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:13px}
.pt-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
  cursor:pointer;transition:transform .1s,box-shadow .12s;position:relative;overflow:hidden}
.pt-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.pt-card .spine{position:absolute;left:0;top:0;bottom:0;width:4px}
.spine.red{background:var(--red)} .spine.amber{background:var(--amber)} .spine.green{background:var(--green)}
.pt-card .pc-b{padding:13px 15px 13px 17px}
.pc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.pc-bed{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--primary-d);
  background:var(--primary-l);padding:2px 8px;border-radius:6px}
.pc-name{font-size:15.5px;font-weight:680;margin:8px 0 2px;letter-spacing:-.01em}
.pc-meta{font-size:12px;color:var(--ink-3);display:flex;gap:8px;flex-wrap:wrap}
.pc-dx{font-size:12.5px;color:var(--ink-2);margin-top:7px;line-height:1.4}
.pc-foot{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line-2);flex-wrap:wrap}
.pc-foot .day{font-family:var(--mono);font-size:11.5px;color:var(--ink-3);font-weight:600}
.flag-dot{font-size:10.5px;font-weight:700;padding:1px 6px;border-radius:5px}

/* ---------- table ---------- */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);
  font-weight:700;padding:9px 12px;border-bottom:1px solid var(--line);white-space:nowrap;background:var(--bg)}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--line-2);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{cursor:pointer}
.tbl tbody tr:hover{background:var(--line-2)}
.tbl .num{font-family:var(--mono);font-variant-numeric:tabular-nums}
.tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:#fff;box-shadow:var(--shadow)}

/* ---------- toolbar / filters ---------- */
.toolbar{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:16px}
.seg{display:inline-flex;background:var(--line-2);border-radius:8px;padding:3px}
.seg button{padding:6px 12px;border-radius:6px;font-size:12.5px;font-weight:600;color:var(--ink-3)}
.seg button.on{background:#fff;color:var(--ink);box-shadow:var(--shadow)}
.chip-filter{padding:7px 13px;border:1px solid var(--line);border-radius:20px;font-size:12.5px;
  font-weight:600;color:var(--ink-2);background:#fff}
.chip-filter.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.chip-filter.on.red{background:var(--red);border-color:var(--red)}
.chip-filter.on.amber{background:var(--amber);border-color:var(--amber)}
.chip-filter.on.green{background:var(--green);border-color:var(--green)}

/* ---------- modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(14,24,38,.5);backdrop-filter:blur(2px);z-index:100;
  display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal{background:#fff;border-radius:14px;box-shadow:var(--shadow-lg);width:100%;max-width:560px;
  margin:auto 0;animation:pop .16s ease-out}
.modal.wide{max-width:820px} .modal.narrow{max-width:420px}
@keyframes pop{from{opacity:0;transform:translateY(8px) scale(.99)}to{opacity:1;transform:none}}
.modal-h{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line-2)}
.modal-h h2{font-size:17px}
.modal-b{padding:20px;max-height:70vh;overflow-y:auto}
.modal-f{display:flex;justify-content:flex-end;gap:9px;padding:14px 20px;border-top:1px solid var(--line-2)}
.x-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.x-btn:hover{background:var(--line-2);color:var(--ink)}

/* ---------- toast ---------- */
#toasts{position:fixed;bottom:22px;right:22px;z-index:200;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--ink);color:#fff;padding:12px 16px;border-radius:10px;box-shadow:var(--shadow-lg);
  font-size:13.5px;font-weight:550;max-width:340px;display:flex;align-items:center;gap:10px;animation:slideIn .2s}
.toast.ok{background:#0f6234} .toast.err{background:#8f1a2e} .toast.warn{background:#8a5709}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}

/* ---------- profile ---------- */
.pf-head{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:16px 18px;margin-bottom:14px;position:relative;overflow:hidden}
.pf-head .spine{position:absolute;left:0;top:0;bottom:0;width:5px}
.pf-top{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap}
.pf-name{font-size:21px;font-weight:720;letter-spacing:-.02em}
.pf-tags{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
.pf-kv{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px 18px;margin-top:14px;
  padding-top:14px;border-top:1px solid var(--line-2)}
.pf-kv .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.pf-kv .v{font-size:13.5px;font-weight:600;margin-top:1px}
.tabbar{display:flex;gap:2px;overflow-x:auto;border-bottom:1px solid var(--line);margin-bottom:16px;scrollbar-width:thin}
.tabbar button{padding:10px 14px;font-size:13px;font-weight:600;color:var(--ink-3);border-bottom:2px solid transparent;
  white-space:nowrap;display:flex;align-items:center;gap:7px}
.tabbar button:hover{color:var(--ink)}
.tabbar button.on{color:var(--primary);border-bottom-color:var(--primary)}
.tabbar button .tc{background:var(--line-2);color:var(--ink-3);font-size:10.5px;font-weight:700;
  padding:0 6px;border-radius:9px;min-width:17px;height:17px;display:inline-flex;align-items:center;justify-content:center}

/* ---------- timeline / entry rows ---------- */
.entry{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:13px 15px;box-shadow:var(--shadow);margin-bottom:10px}
.entry-h{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px}
.entry-h .who{font-size:12.5px;color:var(--ink-3)}
.entry-h .who b{color:var(--ink-2)}
.entry-body{font-size:13.5px;line-height:1.5;white-space:pre-wrap;color:var(--ink-2)}
.tl{position:relative;padding-left:26px}
.tl::before{content:"";position:absolute;left:8px;top:4px;bottom:4px;width:2px;background:var(--line)}
.tl-item{position:relative;margin-bottom:16px}
.tl-item::before{content:"";position:absolute;left:-22px;top:4px;width:11px;height:11px;border-radius:50%;
  background:#fff;border:2.5px solid var(--primary)}
.tl-item.red::before{border-color:var(--red)} .tl-item.amber::before{border-color:var(--amber)}
.tl-item.green::before{border-color:var(--green)} .tl-item.blue::before{border-color:var(--blue)}
.tl-item.purple::before{border-color:var(--purple)}
.tl-time{font-size:11.5px;color:var(--muted);font-family:var(--mono)}
.tl-title{font-size:13.5px;font-weight:650;margin:1px 0}
.tl-desc{font-size:12.5px;color:var(--ink-3)}

/* ---------- empty ---------- */
.empty{text-align:center;padding:46px 20px;color:var(--muted)}
.empty svg{width:44px;height:44px;opacity:.4;margin-bottom:10px}
.empty h3{color:var(--ink-2);font-size:15px;margin-bottom:4px}
.empty p{font-size:13px;margin-bottom:14px}

/* ---------- login ---------- */
.login-wrap{height:100%;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(1200px 500px at 30% -10%,#0e3b44 0%,#0a1c24 55%);padding:20px}
.login-card{background:#fff;border-radius:16px;box-shadow:0 20px 70px rgba(0,0,0,.35);width:100%;max-width:400px;overflow:hidden}
.login-hd{padding:26px 28px 20px;text-align:center;border-bottom:1px solid var(--line-2)}
.login-hd .lg{width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,#0b8a8a,#075353);
  margin:0 auto 12px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:22px}
.login-hd h1{font-size:19px} .login-hd p{color:var(--muted);font-size:12.5px;margin-top:3px}
.login-bd{padding:22px 28px 26px}
.login-hint{margin-top:14px;padding:11px 13px;background:var(--bg);border-radius:9px;font-size:11.5px;color:var(--ink-3)}
.login-hint b{color:var(--ink-2)}
.login-hint code{font-family:var(--mono);background:#fff;padding:1px 5px;border-radius:4px;border:1px solid var(--line)}

/* ---------- misc ---------- */
.divider{height:1px;background:var(--line-2);margin:14px 0}
.kv-list{display:flex;flex-direction:column;gap:0}
.kv-list .r{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--line-2);font-size:13px}
.kv-list .r:last-child{border:none}
.kv-list .r .k{color:var(--ink-3)}
.kv-list .r .v{font-weight:600;text-align:right}
.mini-bar{height:7px;border-radius:4px;background:var(--line-2);overflow:hidden}
.mini-bar>span{display:block;height:100%;background:var(--primary)}
.pill-row{display:flex;gap:7px;flex-wrap:wrap}
.print-only{display:none}
@media print{
  body{overflow:visible;height:auto}
  .sidebar,.topbar,.tabbar,.no-print,.toolbar,#toasts{display:none !important}
  .content{overflow:visible;padding:0}
  .layout,.main{display:block;height:auto}
  .print-only{display:block}
  .card,.entry,.pf-head{box-shadow:none;border-color:#ccc}
}
@media(max-width:860px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:80;transform:translateX(-100%);transition:transform .2s}
  .sidebar.open{transform:none;box-shadow:var(--shadow-lg)}
  .topbar .menu-btn{display:flex}
  .ward-strip{display:none}
  .search-wrap{max-width:none}
  .sb-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:79}
}

</style>
</head>
<body>
<div id="app"></div>
<div id="toasts"></div>
<script src="/socket.io/socket.io.js"></script>
<script src="/app.js"></script>
</body>
</html>
