# Render Blueprint — provisions the database and the web service together.
# In Render: New + → Blueprint → connect the repo containing this file.
databases:
  - name: sums-db
    plan: free                 # ⚠️ Render's free database is temporary — use a paid plan for real data
    postgresMajorVersion: "16"

services:
  - type: web
    name: sums
    runtime: node
    plan: free                 # free web services sleep when idle; use a paid plan for always-on real-time
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sums-db
          property: connectionString
      - key: DATABASE_SSL
        value: "false"          # internal connection, same region — no SSL needed
      - key: JWT_SECRET
        generateValue: true     # Render generates a strong random secret for you
      - key: JWT_EXPIRES
        value: 12h
      - key: CORS_ORIGIN
        value: "*"              # frontend & backend share one origin; tighten to your domain if you wish
      - key: SEED_DEMO
        value: "true"           # set to "false" for a clean production database
